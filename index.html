<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#9B59B6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MTR ETA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚇</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="config-row">
                <span class="current-time" id="topTime"></span>
                <select id="configSelect" class="config-select">
                    <option value="all">All Stations</option>
                    <option value="work" selected>Work</option>
                </select>
            </div>
        </div>

        <div id="stationContainer"></div>

        <footer>
            <button id="refreshBtn" class="refresh-btn" aria-label="Refresh">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
            </button>
            <span id="lastUpdate" class="last-update">Tap to refresh</span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
